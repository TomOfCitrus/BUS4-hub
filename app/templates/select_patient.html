{% extends 'base.html' %}

{% block content %}
    <a href="{{ url_for('index') }}" style="color:white;">Back to Dashboard</a><br>
    <h1>Select Patient</h1>
    {% for patient in approval_list %}
        <a href="{{ url_for('patient_info', patient_id=patient.patient_id) }}" style="color:white;">
            {{ patient.last_name }}, {{ patient.first_name }}
        </a><br><br>
    {% endfor %}
{% endblock %}
