<a href="{{ url_for('update_health_data') }}">Add New Log</a>

{% for log in logs %}
  <div>
    <p>{{ log.created_at }}</p>
    <p>Temp: {{ log.temperature }}</p>
    <p>BP: {{ log.bp_systolic }}/{{ log.bp_diastolic }}</p>
    <p>Mood: {{ log.mood }}</p>

    <a href="{{ url_for('update_health_data', log_id=log.id) }}">Edit</a>

    <form action="{{ url_for('delete_health_data', log_id=log.id) }}" method="POST">
        <button type="submit">Delete</button>
    </form>
  </div>
{% endfor %}
